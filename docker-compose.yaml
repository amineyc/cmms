name: atlas-cmms
services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas_db
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: rootUser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: atlas_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server --address ":9000" --console-address ":9001" /data

  api:
    image: intelloop/atlas-cmms-backend
    container_name: atlas-cmms-backend
    depends_on:
      - postgres
      - minio
    volumes:
      - ./logo:/app/static/images
      - ./config:/app/static/config
    environment:
      DB_URL: postgres/atlas
      DB_USER: rootUser
      DB_PWD: mypassword
      PUBLIC_API_URL: https://cmmsapi.app.imc-dz.com
      PUBLIC_FRONT_URL: https://cmms.app.imc-dz.com
      JWT_SECRET_KEY: sD1HBM6ngcaDLMzDqgA9Pn9LEECNAp0C1EOHIR/D+q4=
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: atlas-bucket
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      STORAGE_TYPE: minio
      PUBLIC_MINIO_ENDPOINT: http://minio:9000
      ENABLE_CORS: "true"
      INVITATION_VIA_EMAIL: "false"
      ENABLE_EMAIL_NOTIFICATIONS: "false"
      ENABLE_SSO: "false"
      LICENSE_FINGERPRINT_REQUIRED: "false"
      MAIL_TYPE: smtp
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PWD: ""
      MAIL_RECIPIENTS: ""
      ALLOWED_ORGANIZATION_ADMINS: ""
      GCP_BUCKET_NAME: ""
      GCP_JSON: ""
      GCP_PROJECT_ID: ""
      OAUTH2_PROVIDER: ""
      OAUTH2_CLIENT_ID: ""
      OAUTH2_CLIENT_SECRET: ""
      LICENSE_KEY: ""
      LICENSE_FILE_PATH: ""
      LOGO_PATHS: ""
      CUSTOM_COLORS: ""
      BRAND_CONFIG: ""
      PADDLE_API_KEY: ""
      PADDLE_WEBHOOK_SECRET_KEY: ""
      PADDLE_ENVIRONMENT: sandbox
      KEYGEN_PRODUCT_TOKEN: ""
      SENDGRID_API_KEY: ""
      SENDGRID_FROM_EMAIL: ""
      SENDGRID_CONTACT_LIST_ID: ""
      RECAPTCHA_SECRET_KEY: ""
    ports:
      - "8089:8080"

  frontend:
    image: intelloop/atlas-cmms-frontend
    container_name: atlas-cmms-frontend
    depends_on:
      - api
    environment:
      API_URL: https://cmmsapi.app.imc-dz.com
      NODE_ENV: production
      INVITATION_VIA_EMAIL: "false"
      CLOUD_VERSION: "false"
      ENABLE_SSO: "false"
      GOOGLE_TRACKING_ID: " "
      GOOGLE_KEY: ""
      OAUTH2_PROVIDER: ""
      LOGO_PATHS: ""
      CUSTOM_COLORS: ""
      BRAND_CONFIG: ""
      DEMO_LINK: ""
      PADDLE_SECRET_TOKEN: ""
      PADDLE_ENVIRONMENT: sandbox
      RECAPTCHA_SITE_KEY: ""
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
